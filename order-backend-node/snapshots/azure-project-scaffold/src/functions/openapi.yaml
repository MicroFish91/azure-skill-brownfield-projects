openapi: 3.0.3
info:
  title: Order Processing API
  version: 0.1.0
  description: Event-driven order processing on Azure Functions, Service Bus, and Cosmos DB.
servers:
  - url: http://localhost:7071/api
    description: Local Functions host
paths:
  /health:
    get:
      summary: Health check
      operationId: health
      responses:
        '200':
          description: Service is healthy or degraded
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HealthResponse' }
        '503':
          description: Service is unhealthy
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HealthResponse' }
  /orders:
    post:
      summary: Submit a new order
      operationId: createOrder
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateOrderRequest' }
      responses:
        '202':
          description: Order accepted and enqueued
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CreateOrderResponse' }
        '422':
          description: Validation error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '503':
          description: Queue unavailable
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
  /orders/{id}:
    get:
      summary: Get order status by ID
      operationId: getOrder
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Order found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Order' }
        '404':
          description: Not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '422':
          description: Invalid order id
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '503':
          description: Cosmos DB unavailable
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
components:
  schemas:
    OrderItem:
      type: object
      required: [sku, quantity, unitPrice]
      properties:
        sku: { type: string }
        quantity: { type: integer, minimum: 1 }
        unitPrice: { type: number, minimum: 0 }
    CreateOrderRequest:
      type: object
      required: [customerId, items]
      properties:
        customerId: { type: string }
        items:
          type: array
          minItems: 1
          items: { $ref: '#/components/schemas/OrderItem' }
    CreateOrderResponse:
      type: object
      required: [orderId, status]
      properties:
        orderId: { type: string, format: uuid }
        status: { type: string, enum: [Pending] }
    Order:
      type: object
      required: [orderId, customerId, items, status, createdAt, updatedAt]
      properties:
        orderId: { type: string, format: uuid }
        customerId: { type: string }
        items:
          type: array
          items: { $ref: '#/components/schemas/OrderItem' }
        status: { type: string, enum: [Pending, Validated, Rejected] }
        rejectionReason: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code: { type: string }
            message: { type: string }
            details: {}
    HealthResponse:
      type: object
      required: [status, services]
      properties:
        status: { type: string, enum: [healthy, degraded, unhealthy] }
        services:
          type: object
          additionalProperties: { type: boolean }
